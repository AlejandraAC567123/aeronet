name: aeronet_app_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.5.0
  shared_preferences: ^2.5.3

  speech_to_text: ^7.3.0
  flutter_local_notifications: ^19.5.0
  geolocator: ^13.0.2
  image_picker: ^1.2.1
  url_launcher: ^6.3.2
  google_fonts: ^6.1.0
  flutter_dotenv: ^5.1.0
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  image: ^4.8.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon_transparent.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon_transparent.png"
  min_sdk_android: 21
